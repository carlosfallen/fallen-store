version: "3.7"
services:
  app_proxy:
    image: getumbrel/app-proxy:latest
    depends_on:
      - kavita
    ports:
      - "5000"
    environment:
      APP_HOST: kavita
      APP_PORT: 5000

  kavita:
    image: jvmilazz0/kavita:latest
    container_name: kavita
    ports:
      - "5000:5000"
    volumes:
      - ./manga:/manga
      - ./config:/kavita/config
    environment:
      - TZ=America/Fortaleza
    restart: unless-stopped
