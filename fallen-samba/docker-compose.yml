version: '3.8'
services:
  samba:
    image: carlosfallen/samba:latest
    container_name: samba
    restart: unless-stopped
    network_mode: host
    volumes:
      # Montar as pastas REAIS do sistema
      - /mnt/data/arquivos/local:/shares/local:rw
      - /mnt/data/arquivos/Win11:/shares/Win11:ro
      # Configuração do samba
      - ${APP_DATA_DIR}/config/smb.conf:/etc/samba/smb.conf:ro
    environment:
      - SAMBA_PASS=jorge
    security_opt:
      - no-new-privileges:true
